<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="icon" href="/image/download.jpeg" type="image/icon-x">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="calendar.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body class="todo-app todo-app-scope">
    <div class="nav-trigger"></div>
    <nav>
        <a href="index.html">Home</a>
        <a href="team.html">Team</a>
        <a href="videos.html">Videos</a>
        <a href="docs.html">Documentation</a>
        <a href="todo.html" class="active">Todo List</a>
    </nav>

    <div class="app-container">
        <!-- Calendar Column -->
        <aside class="calendar-section">
            <h2>CALENDAR</h2>
            <!-- Views Section -->
            <div class="views-section">
                <h3>VIEWS</h3>
                <div class="view-links">
                        <button id="view-all" class="view-link active">
                        <span class="view-icon">📋</span>
                        All Tasks
                        </button>
                        <button id="view-important" class="view-link">
                        <span class="view-icon">⭐</span>
                            Important Tasks
                        </button>
                </div>
            </div>
            <div id="selected-date-display"></div>
            <button id="calendar-toggle" class="calendar-toggle">
                <span>Show Calendar</span>
                <span class="calendar-icon">📅</span>
            </button>
            <div id="calendar-container" class="calendar-hidden">
                <div id="current-month-display" class="calendar-subtitle"></div>
                <div id="task-date"></div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="task-header">
                <h1>To-Do List</h1>
                <div class="task-controls">
                    <div class="search-box">
                        <input type="text" id="task-input" class="task-input" placeholder="Add a new task...">
                    </div>
                    <button id="add-task" class="add-task-btn">Add Task</button>
                </div>
            </div>

            <!-- Tasks for Selected Date -->
            <section class="task-section">
                <h3>Tasks on Selected Date</h3>
                <ul id="task-list" class="task-list">
                    <!-- Tasks will be added here dynamically -->
                </ul>
            </section>

            <!-- All Tasks -->
            <section class="task-section">
                <h3>All Upcoming Tasks</h3>
                <ul id="all-tasks" class="task-list">
                    <!-- All tasks will be shown here -->
                </ul>
            </section>
        </main>
    </div>
            <script src="script.js"></script>
</body>
</html>
