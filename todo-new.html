<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Todo App</title>
    <link rel="stylesheet" href="modern-todo.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body class="todo-app-scope">
    <div class="min-h-screen flex bg-black text-white">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2 class="sidebar-title">CALENDAR</h2>

            <div class="view-section">
                <h3 class="section-title">VIEWS</h3>
                <nav class="view-navigation">
                    <button id="view-all" class="view-button active">
                        All Tasks
                    </button>
                    <button id="view-important" class="view-button">
                        Important Tasks
                    </button>
                </nav>
            </div>

            <div class="calendar-section">
                <h3 class="section-title">Today</h3>
                <button id="calendar-toggle" class="calendar-toggle">
                    <span>Hide Calendar</span>
                </button>
                <div id="calendar-container">
                    <input type="text" id="task-date" placeholder="Select Date" readonly />
                </div>
                <div id="selected-date-display"></div>
            </div>

            <div class="month-section">
                <h3 class="section-title" id="current-month-display"></h3>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1 class="page-title">To-Do List</h1>
                <button id="add-task" class="add-task-button">
                    Add Task
                </button>
            </header>

            <div class="task-input-container">
                <input
                    type="text"
                    id="task-input"
                    placeholder="Add a new task..."
                    class="task-input-field"
                />
            </div>

            <section class="task-section">
                <h2 class="task-section-title" id="selected-date-tasks">
                    Tasks on Selected Date (0)
                </h2>
                <div id="task-list" class="task-list">
                    <!-- Tasks will be inserted here by JavaScript -->
                </div>
            </section>

            <section class="task-section">
                <h2 class="task-section-title" id="all-tasks-title">
                    All Tasks (0) • 0 Completed
                </h2>
                <div id="all-tasks" class="task-list">
                    <!-- All tasks will be inserted here by JavaScript -->
                </div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
