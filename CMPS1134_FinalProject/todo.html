<!DOCTYPE html>
<html lang="en" class="todo-app-scope">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do App</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <meta name="description" content="Scoped light theme To-Do application" />
</head>
<body class="todo-app-scope">
  <a href="index.html" class="btn btn-primary home-btn-fixed" style="text-decoration:none;">Home</a>
  <div class="app">
    <!-- Left Sidebar -->
    <aside class="sidebar">
      <h2>📅 Calendar</h2>
      <input type="date" id="task-date" />
      <div id="selected-date-display">Select a date to view tasks</div>

      <h3>Tasks on Selected Date</h3>
      <ul id="task-list"></ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <h1 style="margin:0;">To-Do List</h1>
      </div>
      <div class="task-input">
        <input type="text" id="task-input" placeholder="Add a new task..." />
        <button id="add-task">Add Task</button>
      </div>

      <div id="summary">
        <h3>All Upcoming Tasks</h3>
        <ul id="all-tasks"></ul>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
